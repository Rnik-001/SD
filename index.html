<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <!-- 确保视口正确，禁止缩放以保持精确布局 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>光合战队 · 横竖屏居中弹窗</title>
    <style>
        /* 彻底重置内外边距，防止任何意外偏移 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* 禁用选中，提升触摸体验 */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: transparent;  /* 完全透明，让底层游戏画面透出 */
            overflow: hidden;         /* 禁止滚动，避免弹窗被推动 */
            position: fixed;          /* 某些环境下加固固定定位 */
        }

        /* 弹窗卡片：始终居中，宽度自适应，高度由内容撑开，带安全边界 */
        .glass-card {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(350px, 85vw);          /* 小屏上自动缩小，最大350px */
            max-width: 90vw;                   /* 极端情况保护 */
            max-height: 90vh;                   /* 不超过视口高度90% */
            overflow-y: auto;                    /* 如果内容太多允许滚动（极少出现） */
            -webkit-overflow-scrolling: touch;    /* 平滑滚动 */

            /* 背景与毛玻璃效果 */
            background: rgba(20, 20, 30, 0.75);
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            border-radius: 35px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 215, 0, 0.3) inset;

            /* 内边距用上下左右均衡，保证内容呼吸 */
            padding: 24px 20px;

            /* 弹性布局，垂直排列，保证内容紧凑 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;                          /* 统一子元素间距，不再依赖外边距 */
        }

        /* 隐藏滚动条（保留功能但视觉干净） */
        .glass-card::-webkit-scrollbar {
            display: none;
        }
        .glass-card {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 闪烁免费提示（自适应内部文本） */
        .free-badge {
            font-size: clamp(22px, 6vw, 28px);   /* 响应式字体，最小22，最大28 */
            font-weight: 800;
            text-align: center;
            padding: 16px 12px;
            border-radius: 60px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            border: 2px solid #ffd966;
            width: 100%;
            animation: blink-glow 1.2s infinite ease-in-out;
            color: #ffe68f;
            text-shadow: 0 0 5px #ffb347, 0 0 15px #ff8c00;
            line-height: 1.3;
            word-break: break-word;              /* 防止长单词溢出 */
        }

        @keyframes blink-glow {
            0% { color: #ffe68f; text-shadow: 0 0 5px #ffb347, 0 0 15px #ff8c00; border-color: #ffb347; background-color: rgba(0,0,0,0.5); }
            50% { color: #ffffff; text-shadow: 0 0 15px #ffaa33, 0 0 30px #ff7700; border-color: #ffffff; background-color: rgba(30,30,40,0.7); }
            100% { color: #ffe68f; text-shadow: 0 0 5px #ffb347, 0 0 15px #ff8c00; border-color: #ffb347; background-color: rgba(0,0,0,0.5); }
        }

        /* 醒目TG跳转按钮——使用<a>标签以保证原生跳转，但样式完全自定义 */
        .tg-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 12px;
            background: rgba(0, 120, 220, 0.3);
            backdrop-filter: blur(4px);
            border-radius: 50px;
            border: 2px solid #4aa0ff;
            box-shadow: 0 0 25px #0066ff, 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            text-decoration: none;
            width: 100%;
            color: white;
            font-weight: 700;
            font-size: clamp(18px, 5vw, 22px);   /* 响应式字体 */
            text-shadow: 0 0 8px #0099ff, 0 0 16px #0066cc;
            letter-spacing: 0.5px;
            border: none;
            outline: none;
            cursor: pointer;
            -webkit-appearance: none;
            box-sizing: border-box;
        }

        .tg-link:active {
            transform: scale(0.96);
            background: rgba(0, 150, 255, 0.5);
            box-shadow: 0 0 35px #00aaff;
        }

        .tg-icon {
            font-size: 1.4em;            /* 相对单位，跟随按钮字体 */
            filter: drop-shadow(0 0 6px #0099ff);
            line-height: 1;
        }

        /* 底部小提示（自适应折行） */
        .hint-text {
            margin-top: 4px;
            font-size: clamp(12px, 3.5vw, 14px);
            color: rgba(255, 255, 255, 0.7);
            text-shadow: 0 1px 3px black;
            border-top: 1px dashed rgba(255,255,255,0.2);
            padding-top: 15px;
            width: 100%;
            text-align: center;
            line-height: 1.5;
            word-break: break-word;
        }

        /* 修正错别字并保留原意（售卖者 → 售卖者） */
        /* 同时也让 emoji 与文字和谐 */
    </style>
</head>
<body>
    <div class="glass-card">
        <!-- 闪烁核心提示 -->
        <div class="free-badge">
            🚫 本插件暂停使用 🚫
        </div>

        <!-- 使用 <a> 替代 button，保证跳转可靠；target="_blank" 在新标签页/外部应用打开 -->
        <a class="tg-link" href="https://t.me/iOSAWJ" target="_blank" rel="noopener noreferrer">
            <span class="tg-icon">✈️</span>
            <span>𝐓𝐆频道 @𝐢𝐎𝐒𝐀𝐖𝐉</span>
            <span class="tg-icon">📢</span>
        </a>

        <!-- 底部辅助提示（修正错别字，使文案更通顺） -->
        <div class="hint-text">
            ⚠️ 如果你花钱看到此页面，说明你已经被骗了，本插件已暂停使用。请立即举报售卖者 ⚠️<br>
            并点击按钮进入 TG ✈️ 频道获取最新资源与防护版本
        </div>
    </div>

    <script>
        // 极简补充：确保触屏事件不会误触发页面缩放（但 meta 已禁止缩放）
        // 同时防止点击链接时事件冒泡干扰（<a>本身行为已足够）
        document.querySelector('.tg-link').addEventListener('touchstart', (e) => {
            e.stopPropagation();   // 阻止可能的上层处理，但不阻止默认跳转
        }, { passive: false });
    </script>
</body>
</html>
