<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>王者视距 · 超凡调节工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* 明亮活力渐变背景 - 去掉黑底 */
            background: linear-gradient(145deg, #f0f9ff 0%, #e6f4ea 50%, #fef9e0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 动态光效背景 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 40%, rgba(255,215,130,0.25) 0%, rgba(145, 230, 180, 0.2) 100%);
            pointer-events: none;
            z-index: 0;
        }

        .floating-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(35,181,116,0.2) 0%, rgba(35,181,116,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: floatGlow 12s infinite alternate ease-in-out;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            100% { transform: translate(40px, 30px) scale(1.3); opacity: 0.8; }
        }

        .tool-container {
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
            opacity: 0;
            transform: translateY(25px);
            transition: all 0.6s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            pointer-events: none;
            position: relative;
            z-index: 10;
        }

        .tool-container.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 56px;
            border: 1px solid rgba(35, 181, 116, 0.5);
            box-shadow: 0 25px 45px -12px rgba(0, 32, 20, 0.25), 0 4px 12px rgba(0,0,0,0.05);
            overflow: hidden;
            padding: 30px 26px 36px;
            transition: all 0.3s ease;
        }

        .hero {
            text-align: center;
            margin-bottom: 24px;
        }

        .free-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(115deg, #FFD966, #FFB347);
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 13px;
            font-weight: 800;
            color: #2c3e2b;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px rgba(255,180,70,0.3);
            backdrop-filter: blur(2px);
            letter-spacing: 0.5px;
            border: 1px solid rgba(255,215,0,0.6);
        }

        .hero-icon {
            font-size: 54px;
            filter: drop-shadow(0 6px 12px rgba(35,181,116,0.3));
            margin-bottom: 8px;
        }

        .hero h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #1F8A5C, #23B574, #FFC857);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(35, 181, 116, 0.2);
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            color: #1f6e4a;
            border: 0.5px solid rgba(35, 181, 116, 0.5);
        }

        .action-btn {
            width: 100%;
            background: white;
            border: none;
            border-radius: 80px;
            padding: 15px 20px;
            margin: 10px 0;
            font-size: 17px;
            font-weight: 700;
            color: #1c2e36;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: 0.3px;
            border: 1px solid rgba(35, 181, 116, 0.3);
            background: rgba(255,255,245,0.9);
        }

        .action-btn:active {
            transform: scale(0.97);
            background: #f0f7f0;
        }

        .btn-primary {
            background: linear-gradient(105deg, #23B574, #1f8a5c);
            color: white;
            border: none;
            box-shadow: 0 8px 20px rgba(35, 181, 116, 0.35);
            position: relative;
            overflow: hidden;
        }

        .channel-btn {
            background: linear-gradient(95deg, #2c3e5c, #1a2a3f);
            border: 1px solid #ffd966;
            color: #fff7e8;
            position: relative;
            overflow: hidden;
            margin-top: 8px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }

        .channel-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,217,102,0.5), transparent);
            transition: left 0.6s ease;
        }

        .channel-btn:hover::before {
            left: 100%;
        }

        .action-btn.active-special {
            background: linear-gradient(95deg, #e9ffe6, #c8f0da);
            border: 1.5px solid #23B574;
            color: #156b48;
            box-shadow: 0 0 12px rgba(35, 181, 116, 0.5);
        }

        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, #23B574, #FFD966, transparent);
            margin: 20px 0 16px;
            border-radius: 4px;
        }

        .footer-note {
            text-align: center;
            font-size: 12px;
            color: #4b5e5a;
            margin-top: 24px;
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            font-weight: 500;
            background: rgba(35,181,116,0.08);
            padding: 8px 16px;
            border-radius: 60px;
        }

        .footer-note a {
            color: #1f8a5c;
            text-decoration: none;
            font-weight: 700;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .status-tip {
            font-size: 12px;
            text-align: center;
            margin-top: 14px;
            background: rgba(35,181,116,0.12);
            border-radius: 100px;
            padding: 6px 14px;
            display: inline-block;
            font-weight: 500;
            color: #2a6e50;
        }

        /* 模态框（验证弹窗）明亮风格 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 250, 235, 0.92);
            backdrop-filter: blur(16px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
            opacity: 1;
        }

        .modal-card {
            width: 86%;
            max-width: 380px;
            background: rgba(255, 255, 245, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            border: 1px solid rgba(35, 181, 116, 0.7);
            padding: 32px 24px 42px;
            text-align: center;
            box-shadow: 0 35px 60px rgba(0, 32, 16, 0.2);
            animation: fadeSlideUp 0.45s cubic-bezier(0.2, 0.9, 0.3, 1.2);
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(35px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-icon {
            font-size: 54px;
            margin-bottom: 12px;
        }

        .modal-card h3 {
            font-size: 26px;
            font-weight: 800;
            color: #1f8a5c;
            margin-bottom: 12px;
        }

        .modal-warning {
            background: rgba(35, 181, 116, 0.12);
            padding: 16px;
            border-radius: 32px;
            font-size: 14px;
            color: #2c4e3c;
            margin: 20px 0;
            border-left: 4px solid #23B574;
            text-align: left;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 14px 20px;
            background: white;
            border: 1.5px solid #cde6db;
            border-radius: 60px;
            font-size: 16px;
            color: #1e2f2a;
            text-align: center;
            font-weight: 600;
            transition: all 0.2s;
        }

        .input-group input:focus {
            border-color: #23B574;
            outline: none;
            box-shadow: 0 0 0 3px rgba(35, 181, 116, 0.2);
        }

        .modal-btn {
            background: linear-gradient(95deg, #23B574, #1a8c5a);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }

        .error-tip {
            color: #e67e22;
            font-size: 12px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div id="dynamicGlow1" class="floating-glow" style="top: -80px; left: -50px;"></div>
<div id="dynamicGlow2" class="floating-glow" style="bottom: -50px; right: -30px; animation-duration: 15s;"></div>

<!-- 验证弹窗 -->
<div id="entryModal" class="modal-overlay">
    <div class="modal-card">
        <div class="modal-icon">🎮✨</div>
        <h3>⚡ 用户协议 · 完全免费 ⚡</h3>
        <div class="modal-warning">
            🔓 <strong>永久免费 · 仅学习交流</strong><br>
            🚫 严禁任何贩卖行为，一经发现立即封禁。<br>
            🛡️ 修改视距属于个人行为，请遵守游戏规则，风险自负。<br>
            💎 本工具不收取任何费用，请勿上当受骗。
        </div>
        <div class="input-group">
            <input type="text" id="confirmInput" placeholder="输入「OK」表示已知晓并同意" autocomplete="off">
            <div id="modalError" class="error-tip"></div>
        </div>
        <button class="modal-btn" id="confirmBtn">✅ 确认进入 · 免费使用</button>
        <div style="font-size: 11px; margin-top: 16px; color: #5f7c6e;">✊ 加入频道获取更多免费技术</div>
    </div>
</div>

<!-- 主工具界面 -->
<div id="mainTool" class="tool-container">
    <div class="glass-card">
        <div class="hero">
            <div class="free-badge">
                <span>💎</span> 完全免费 · 永不收费 <span>✨</span>
            </div>
            <div class="hero-icon">🏆🔑</div>
            <h1>王者· 𝐒𝟒𝟑视距</h1>
            <div class="hero-badge">自定义视距 · 流畅高帧</div>
        </div>
        
        <button id="button1" class="action-btn btn-primary">
            🌟 ① 2.0倍视距（一键超广角）
        </button>
        <button id="button2" class="action-btn">
            🎛️ ② 自定义视距 (0.5~9.9倍)
        </button>
        
        <div class="divider"></div>
        
        <button id="tgChannelBtn" class="action-btn channel-btn">
            ✈️ 加入 TG 频道 · 免费进阶教程 ✈️
        </button>
        
        <div class="footer-note">
            <span>© 2026 爱玩机 · 技术交流</span>
            <span>🌹 学习研究 · 绿色免费</span>
            <a href="#" id="fakeChannelLink" style="display: inline-flex;">📢 免费通道 →</a>
        </div>
        <div style="text-align: center; margin-top: 14px;">
            <span class="status-tip" id="gameStatusText">⚙️ 等待游戏连接...</span>
        </div>
    </div>
</div>

<script>
    // ---------- 核心视距功能（完全保留）----------
    let isActive1 = false;
    let isActive2 = false;
    let gameProcess = null;
    let memoryBase = null;
    let isAppInitialized = false;
    let checkInterval = null;

    const mainTool = document.getElementById('mainTool');
    const modalOverlay = document.getElementById('entryModal');
    const confirmInput = document.getElementById('confirmInput');
    const confirmBtn = document.getElementById('confirmBtn');
    const modalError = document.getElementById('modalError');
    const gameStatusSpan = document.getElementById('gameStatusText');

    // TG 频道真实链接
    const realChannelUrl = "https://t.me/iOSAWJ";
    document.getElementById('tgChannelBtn').addEventListener('click', () => {
        window.open(realChannelUrl, '_blank');
    });
    document.getElementById('fakeChannelLink').addEventListener('click', (e) => {
        e.preventDefault();
        window.open(realChannelUrl, '_blank');
    });

    function updateGameStatus(message, isError = false) {
        if (gameStatusSpan) {
            gameStatusSpan.textContent = message;
            gameStatusSpan.style.color = isError ? "#e67e22" : "#1f8a5c";
        }
    }

    // 检测游戏进程和内存
    function checkProcessAndMemory() {
        return new Promise((resolve, reject) => {
            try {
                if (typeof h5gg === 'undefined') {
                    updateGameStatus("❌ 请在游戏内运行此工具 (需h5gg环境)", true);
                    reject("h5gg missing");
                    return;
                }
                const procs = h5gg.getProcList();
                gameProcess = procs.find(p => p && (p.name === "smoba" || (p.name && p.name.toLowerCase().includes("smoba"))));
                if (!gameProcess) {
                    updateGameStatus("🔍 未检测到王者荣耀进程，请启动游戏并进入大厅", false);
                    reject("no game process");
                    return;
                }
                h5gg.setTargetProc(gameProcess.pid);
                h5gg.clearResults();
                updateGameStatus("✅ 已关联游戏进程，正在获取基址...");
                try {
                    const ranges = h5gg.getRangesList('UnityFramework');
                    if (ranges && ranges.length > 0) {
                        memoryBase = ranges[0].start;
                        updateGameStatus("✨ 基址就绪 · 可自由调节视距 (免费)");
                        resolve(true);
                    } else {
                        updateGameStatus("⚠️ 无法定位UnityFramework模块，视距可能失效", true);
                        reject("no unity range");
                    }
                } catch (e) {
                    updateGameStatus("内存读取异常: " + e.message, true);
                    reject(e);
                }
            } catch (e) {
                updateGameStatus("进程检查错误: " + e.message, true);
                reject(e);
            }
        });
    }

    // 修改视距
    function setCameraDistance(value) {
        if (!gameProcess || !memoryBase) {
            alert("游戏进程未连接或内存未就绪，请确保王者荣耀已启动并在大厅界面");
            return false;
        }
        try {
            const baseAddr = Number(memoryBase) + 0x12ACEE98;
            const ptr1 = h5gg.getValue(baseAddr, 'I64');
            if (!ptr1 || ptr1 === 0) {
                alert("内存指针无效，游戏版本可能不兼容");
                return false;
            }
            const chain1 = Number(ptr1) + 0xB8;
            const ptr2 = h5gg.getValue(chain1, 'I64');
            if (!ptr2 || ptr2 === 0) {
                alert("第二级指针偏移失败");
                return false;
            }
            const finalAddr = Number(ptr2) + 0x29C;
            h5gg.setValue(finalAddr, value, 'F32');
            return true;
        } catch (err) {
            alert("修改视距时发生异常: " + err.message);
            return false;
        }
    }

    // 2.0倍切换
    function toggleMenu1() {
        const btn1 = document.getElementById('button1');
        if (!gameProcess || !memoryBase) {
            alert("游戏尚未准备好，请确保王者荣耀运行在大厅界面");
            return;
        }
        if (!isActive1) {
            const success = setCameraDistance(2.0);
            if (success) {
                isActive1 = true;
                btn1.classList.add('active-special');
                btn1.innerHTML = '✅ ① 2.0倍视距 · 已激活';
                alert('⚡ 2.0倍视距已生效 (大厅可见效果)');
                if (isActive2) {
                    const btn2 = document.getElementById('button2');
                    btn2.classList.remove('active-special');
                    btn2.innerHTML = '🎛️ ② 自定义视距 (0.5~9.9)';
                    isActive2 = false;
                }
            }
        } else {
            const confirmReset = confirm("是否关闭2.0倍视距？\n注意：关闭后不会自动恢复默认值，建议重新启动游戏大厅或使用自定义设为默认1.0。");
            if (confirmReset) {
                isActive1 = false;
                btn1.classList.remove('active-special');
                btn1.innerHTML = '🌟 ① 2.0倍视距（一键超广角）';
                alert("2.0倍视距已标记关闭，如需彻底还原请重进游戏或手动调节自定义视距为1.0");
            }
        }
    }

    // 自定义视距
    function toggleMenu2() {
        const btn2 = document.getElementById('button2');
        if (!gameProcess || !memoryBase) {
            alert("游戏进程未连接，请先启动王者荣耀");
            return;
        }
        let customVal = prompt("✨ 请输入视距倍数 (推荐 1.2~3.5，范围0.5~9.9):", "2.2");
        if (customVal === null) return;
        const val = parseFloat(customVal);
        if (isNaN(val) || val < 0.5 || val > 9.9) {
            alert("请输入 0.5 到 9.9 之间的有效数字");
            return;
        }
        const success = setCameraDistance(val);
        if (success) {
            if (isActive1) {
                const btn1 = document.getElementById('button1');
                btn1.classList.remove('active-special');
                btn1.innerHTML = '🌟 ① 2.0倍视距（一键超广角）';
                isActive1 = false;
            }
            isActive2 = true;
            btn2.classList.add('active-special');
            btn2.innerHTML = `🎯 ② 自定义[${val}x] · 已生效`;
            alert(`自定义视距 ${val}x 已生效！ (效果在大厅实时可见)`);
        } else {
            alert("自定义视距写入失败，请检查游戏环境");
        }
    }

    function reconnectGame() {
        if (!window.h5gg) {
            updateGameStatus("⚠️ 环境错误", true);
            return false;
        }
        checkProcessAndMemory().then(() => {
            updateGameStatus("🎮 已连接 · 免费调节视距");
        }).catch(err => {
            setTimeout(() => reconnectGame(), 4000);
        });
    }

    // 验证通过后初始化工具
    function initAppAfterVerify() {
        if (isAppInitialized) return;
        isAppInitialized = true;

        // 重新绑定按钮（避免重复）
        const oldBtn1 = document.getElementById('button1');
        const oldBtn2 = document.getElementById('button2');
        const newBtn1 = oldBtn1.cloneNode(true);
        const newBtn2 = oldBtn2.cloneNode(true);
        oldBtn1.parentNode.replaceChild(newBtn1, oldBtn1);
        oldBtn2.parentNode.replaceChild(newBtn2, oldBtn2);

        const finalBtn1 = document.getElementById('button1');
        const finalBtn2 = document.getElementById('button2');
        finalBtn1.addEventListener('click', toggleMenu1);
        finalBtn2.addEventListener('click', toggleMenu2);

        updateGameStatus("🔌 正在连接王者荣耀进程...");
        if (typeof h5gg !== 'undefined') {
            checkProcessAndMemory().then(() => {
                updateGameStatus("✅ 游戏已关联 · 大厅模式就绪 (完全免费)");
                if (checkInterval) clearInterval(checkInterval);
                checkInterval = setInterval(() => {
                    if (gameProcess && memoryBase) return;
                    if (typeof h5gg !== 'undefined') {
                        checkProcessAndMemory().catch(() => {});
                    }
                }, 5000);
            }).catch(() => {
                updateGameStatus("⚠️ 等待王者荣耀启动 (大厅界面)", false);
                let retryCount = 0;
                const retryConnect = setInterval(() => {
                    if (gameProcess && memoryBase) {
                        clearInterval(retryConnect);
                        updateGameStatus("🎉 视距工具已就绪 · 免费畅享");
                        return;
                    }
                    if (typeof h5gg !== 'undefined') {
                        checkProcessAndMemory().then(() => {
                            updateGameStatus("✨ 已成功获取游戏视距地址 · 免费调节");
                            clearInterval(retryConnect);
                        }).catch(() => {});
                    }
                    retryCount++;
                    if (retryCount > 20) clearInterval(retryConnect);
                }, 2500);
            });
        } else {
            updateGameStatus("❌ 当前环境缺少运行库，请在正确工具内打开", true);
        }
    }

    // 验证逻辑
    function verifyAndEnter() {
        const inputVal = confirmInput.value.trim();
        if (inputVal === "OK") {
            modalOverlay.style.opacity = "0";
            setTimeout(() => {
                modalOverlay.style.display = "none";
                mainTool.classList.add("visible");
                initAppAfterVerify();
            }, 280);
        } else {
            modalError.innerText = "⚠️ 请输入完整文字「OK」以确认免费使用条款";
            confirmInput.style.borderColor = "#ffb347";
            setTimeout(() => {
                if (modalError) modalError.innerText = "";
                confirmInput.style.borderColor = "#cde6db";
            }, 1800);
        }
    }

    confirmBtn.addEventListener('click', verifyAndEnter);
    confirmInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            verifyAndEnter();
        }
    });

    mainTool.classList.remove('visible');
    modalOverlay.style.display = 'flex';

    // 动态光效跟随鼠标（可选）
    document.body.addEventListener('mousemove', (e) => {
        const glow1 = document.getElementById('dynamicGlow1');
        if (glow1 && window.innerWidth > 768) {
            glow1.style.transform = `translate(${e.clientX * 0.02}px, ${e.clientY * 0.02}px)`;
        }
    });

    window.addEventListener('beforeunload', () => {
        if (checkInterval) clearInterval(checkInterval);
    });
